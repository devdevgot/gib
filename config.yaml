# GIB Configuration
openrouter:
  base_url: "https://openrouter.ai/api/v1"
  timeout: 120
  max_retries: 3

models:
  default: "anthropic/claude-sonnet-4"           # Главный архитектор
  code: "openai/gpt-4o"                          # Главный разработчик
  reviewer: "google/gemini-2.5-pro"              # Второе мнение / проверка
  fast: "google/gemini-2.5-flash"
  cheap: "deepseek/deepseek-chat"
  large_context: "google/gemini-2.5-pro"
  docs: "google/gemini-2.5-pro"
  tests: "openai/gpt-4o"

routing:
  rules:
    # ── Архитектор (Claude Sonnet 4) ──────────────────────────
    - task_type: "architecture"
      model: "anthropic/claude-sonnet-4"
      reason: "Chief architect — system design & high-level decisions"
    - task_type: "general"
      model: "anthropic/claude-sonnet-4"
      reason: "Chief architect handles free-form tasks"
    - task_type: "refactor"
      model: "anthropic/claude-sonnet-4"
      reason: "Architect leads major refactors"
    - task_type: "explain"
      model: "anthropic/claude-sonnet-4"
      reason: "Deep explanations need the architect"
    - task_type: "chat"
      model: "anthropic/claude-sonnet-4"
      reason: "Interactive sessions with the architect"

    # ── Разработчик (GPT-4o) ─────────────────────────────────
    - task_type: "fix"
      model: "openai/gpt-4o"
      reason: "Lead developer handles bug fixing"
    - task_type: "test"
      model: "openai/gpt-4o"
      reason: "Lead developer writes tests"
    - task_type: "commit"
      model: "openai/gpt-4o"
      reason: "Developer generates commit messages"
    - task_type: "watch"
      model: "openai/gpt-4o"
      reason: "Developer provides live code feedback"
    - task_type: "development"
      model: "openai/gpt-4o"
      reason: "Core development tasks handled by lead developer"
    - task_type: "security"
      model: "openai/gpt-4o"
      reason: "Security checks by lead developer"

    # ── Исследователь (Gemini 2.5 Pro) ─────────────────────────
    - task_type: "research"
      model: "google/gemini-2.5-pro"
      reason: "Research best practices, docs, and compatibility"

    # ── Второе мнение (Gemini 2.5 Pro) ───────────────────────
    - task_type: "review"
      model: "google/gemini-2.5-pro"
      reason: "Second opinion — thorough code review"
    - task_type: "doctor"
      model: "google/gemini-2.5-pro"
      reason: "Error search & deep diagnostics with long context"
    - task_type: "docs"
      model: "google/gemini-2.5-pro"
      reason: "Documentation verification & generation"

agents:
  max_parallel: 4
  timeout: 300

memory:
  db_path: "~/.gib/memory.db"
  max_history: 1000

ui:
  show_cost: true
  show_time: true
  show_model: true
  show_agents: true
  theme: "dark"

security:
  auto_apply: false
  require_confirmation: true
  show_diff: true

logging:
  level: "INFO"
  log_dir: "~/.gib/logs"
